services:
  # Node.js Full-Stack App (Express backend serving static frontend)
  - type: web
    name: ai-powered-interview-coach
    runtime: node
    rootDir: AI_powered_interview_project
    buildCommand: npm install
    startCommand: node Server.js
    envVars:
      - key: GOOGLEGEMINI_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false
